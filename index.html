<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Grid</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="calculator-wrapper">
        <h1 class="username">Soham's Calculator</h1>
        <div class="container">
            <div class="input"><input type="text" name="input" id="input"></div>
            <div class="ac">AC</div>
            <div class="%">%</div>
            <div class="/">/</div>
            <div class="*">×</div>

            <div class="7">7</div>
            <div class="8">8</div>
            <div class="9">9</div>
            <div class="-">-</div>

            <div class="4">4</div>
            <div class="5">5</div>
            <div class="6">6</div>
            <div class="+">+</div>

            <div class="1">1</div>
            <div class="2">2</div>
            <div class="3">3</div>
            <div class=".">.</div>
            <div class="_"> </div>
            <div class="0 zero">0</div>
            <div class="_"> </div>

            <div class="= equals">=</div>
        </div>
    </div>

    <script src="index.js"></script>
</body>


</html>
